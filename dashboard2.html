<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard 2</title>
  <link rel="stylesheet" href="css/base.css" />
  <script src="js/config.js"></script>
  <script src="js/dashboard2.js" defer></script>
</head>
<body>
  <img
    src="images/bg-dashboard2.png"
    alt="Dashboard 2 background"
    id="bgDashboard2"
    class="bg-dashboard2"
  />
  <!-- Overlay hotspots are positioned by dashboard2.js to match the background image -->
  <div id="dashboard2Overlay" class="dashboard-overlay">
    <span id="loggedInUserId2" class="logged-in-user-id"></span>
    <a
      id="publicActivitySidebarLink2"
      class="dashboard-hotspot"
      href="dashboard2.html"
      aria-label="Public Activity Sidebar"
    >
      Public Activity
    </a>
    <a
      id="publicActivitiesTopLink2"
      class="dashboard-hotspot"
      href="dashboard2.html"
      aria-label="Public Activities Top"
    >
      Public Activities
    </a>
    <button
      id="mapTrackingButton"
      class="dashboard-tab-button"
      type="button"
      aria-label="Map Tracking System"
    >
      Map Tracking System
    </button>
    <a
      id="closeLink2"
      class="dashboard-hotspot"
      href="dashboard.html"
      aria-label="Close"
    >
      Close
    </a>
    <a
      id="logoutLink2"
      class="logout-hotspot"
      href="index.html"
      aria-label="Log Out"
    >
      Log Out
    </a>
  </div>
</body>
</html>
