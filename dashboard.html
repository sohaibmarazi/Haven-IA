<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <link rel="stylesheet" href="css/base.css" />
  <script src="js/config.js"></script>
  <script src="js/dashboard.js" defer></script>
</head>
<body>
  <img
    src="images/bg-dashboard.png"
    alt="Dashboard background"
    id="bgDashboard"
    class="bg-dashboard"
  />

  <!-- Overlay hotspots are positioned by dashboard.js to match the background image -->
  <div id="dashboardOverlay" class="dashboard-overlay">
    <span id="loggedInUserId" class="logged-in-user-id"></span>
    <a
      id="publicActivityLink"
      class="dashboard-hotspot public-activity-hotspot"
      href="dashboard2.html"
      aria-label="Public Activity"
    >
      Public Activity
    </a>
    <a id="logoutLink" class="logout-hotspot" href="index.html" aria-label="Log Out">
      Log Out
    </a>
  </div>
</body>
</html>
